name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/smix-website-q7kxgb
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages, and let one deploy finish at a time.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        # enablement: true turns on GitHub Pages (build type "workflow") via the
        # API during the run, so the deploy step below doesn't 404 when Pages has
        # not yet been enabled in repo settings.
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build with Astro
        uses: withastro/action@v3
        # withastro/action installs deps, runs `astro build`, and uploads
        # the dist/ artifact for Pages. It reads `site`/`base` from astro.config.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
